name: Service tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: service-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff==0.15.16
      - run: ruff check services scripts

  python-services:
    name: ${{ matrix.service }} (pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [accounting-service, stock-portfolio-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements*.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -q

  shared-python-lib:
    name: shared-python-lib (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/shared-python-lib
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/shared-python-lib/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest -q

  inventory-api:
    name: inventory-api (gradle test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test
        working-directory: services/inventory-api

  frontend:
    name: frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx ng test --watch=false

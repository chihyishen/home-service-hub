name: Service tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: service-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff==0.15.16
      - run: ruff check services scripts

  python-services:
    name: ${{ matrix.service }} (pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [accounting-service, stock-portfolio-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    env:
      # app/database.py builds the engine URL at import time (locally fed by
      # the root .env); tests themselves run on SQLite and never connect.
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci
      DB_HOST: localhost
      POSTGRES_PORT: "5432"
      ACCOUNTING_DB: accounting_ci
      STOCK_DB: stock_ci
      # accounting boots tracing in strict mode; the exporter is lazy, so a
      # dead endpoint is fine for tests.
      OTEL_SERVICE_NAME_ACCOUNTING: accounting-service-ci
      OTEL_SERVICE_NAME_STOCK: stock-portfolio-service-ci
      OTEL_COLLECTOR_ENDPOINT_GRPC: http://localhost:4317
      POST_IMPORT_RECALC_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements*.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -q

  shared-python-lib:
    name: shared-python-lib (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/shared-python-lib
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/shared-python-lib/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest -q

  inventory-api:
    name: inventory-api (gradle test)
    runs-on: ubuntu-latest
    env:
      # application.yml placeholders without defaults (locally fed by the root
      # .env via build.gradle.kts); IntegrationTestBase overrides the
      # datasource to H2, so Postgres is never contacted.
      SPRING_APPLICATION_NAME: item-service
      INVENTORY_ITEM_SERVICE_PORT: "8080"
      DB_HOST: localhost
      POSTGRES_PORT: "5432"
      INVENTORY_DB: inventory_ci
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci
      OTEL_COLLECTOR_ENDPOINT_HTTP: http://localhost:4318
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test
        working-directory: services/inventory-api

  frontend:
    name: frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # set-env.js generates src/environments/environment.ts and reads only
      # the root .env file (no process.env fallback) — seed it from the example.
      - run: cp ../.env.example ../.env
      - run: node set-env.js
      - run: npx ng test --watch=false

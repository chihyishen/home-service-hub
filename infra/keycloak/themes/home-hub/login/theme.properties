# Home Hub login theme — CSS-only override of the built-in keycloak.v2 theme.
parent=keycloak.v2
import=common/keycloak

# Load the parent's stylesheet first, then our overrides.
# (Resource paths resolve through the theme hierarchy, so css/styles.css
# comes from keycloak.v2 and css/home-hub.css from this theme.)
styles=css/styles.css css/home-hub.css

# Keep the light, iOS-like look regardless of OS dark mode.
darkMode=false

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  filelog/streamer_dvr:
    include:
      - /var/log/streamer-dvr/*.out.log
    start_at: end
    include_file_path: true
    operators:
      - type: json_parser
        id: parse_streamer_dvr_event
        parse_from: body
        parse_to: attributes
        on_error: drop
      - type: severity_parser
        id: parse_streamer_dvr_level
        parse_from: attributes.level
      - type: add
        field: resource["service.name"]
        value: streamer-dvr

exporters:
  debug:
    verbosity: basic # 改為基本摘要，不顯示詳細內容

  otlp_grpc:
    endpoint: tempo:4317
    tls:
      insecure: true
  
  otlp_http/loki:
    endpoint: "http://loki:3100/otlp"
    tls:
      insecure: true

processors:
  batch:
  
  transform:
    log_statements:
      - context: log
        statements:
          - set(attributes["service_name"], resource.attributes["service.name"])
          - set(attributes["app"], resource.attributes["service.name"])

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc]
    logs:
      receivers: [otlp, filelog/streamer_dvr]
      processors: [transform, batch]
      exporters: [otlp_http/loki] # 移除 debug，僅發送到 Loki

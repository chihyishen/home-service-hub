apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: true

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    access: proxy
    editable: true
    jsonData:
      search:
        hide: false
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: loki
      tracesToLogs:
        datasourceUid: loki
        filterBySpanID: false
        filterByTraceID: true
        mapTagNamesEnabled: true

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    editable: true
    jsonData:
      derivedFields:
        # 1. 針對日誌文字內容 (Log Line) 中的 traceId=xxxx
        - datasourceUid: tempo
          matcherRegex: "traceId=(\\w+)"
          name: TraceID
          url: '$${__value.raw}'
          urlDisplayLabel: 'View Trace'

        # 2. 針對 Structured Metadata 中的 trace_id (OTLP 標準)
        - datasourceUid: tempo
          matcherType: "label"
          matcherRegex: "trace_id"
          name: trace_id
          url: '$${__value.raw}'
          urlDisplayLabel: 'View Trace'

        # 3. 針對 Structured Metadata 中的 traceId (其他格式)
        - datasourceUid: tempo
          matcherType: "label"
          matcherRegex: "traceId"
          name: traceId
          url: '$${__value.raw}'
          urlDisplayLabel: 'View Trace'

correlations:
  - sourceUID: loki
    targetUID: tempo
    label: "Trace"
    description: "Link to Tempo trace from structured metadata (trace_id)"
    config:
      field: "trace_id"
      type: "query"
      target:
        queryType: "traceId"
        query: "$${__value.raw}"
  - sourceUID: loki
    targetUID: tempo
    label: "Trace"
    description: "Link to Tempo trace from structured metadata (traceId)"
    config:
      field: "traceId"
      type: "query"
      target:
        queryType: "traceId"
        query: "$${__value.raw}"

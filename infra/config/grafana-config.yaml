apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: true

  - name: Tempo
    type: tempo
    access: proxy
    orgId: 1
    url: http://tempo:3200
    basicAuth: false
    isDefault: false
    version: 1
    editable: true
    apiVersion: 1
    uid: tempo
    jsonData:
      httpMethod: GET
      nodeGraph:
        enabled: true
      search:
        hide: false

  - name: Loki
    type: loki
    access: proxy
    orgId: 1
    url: http://loki:3100
    basicAuth: false
    isDefault: false
    version: 1
    editable: true
    apiVersion: 1
    jsonData:
      derivedFields:
        - datasourceUid: tempo  # 告訴它跳轉到哪個 Data Source (上面定義的 Tempo uid)
          matcherRegex: "traceId=(\\w+)" # 正則表達式：抓取 Log 裡的 traceId=後面那串字
          name: TraceID        # 連結顯示的名稱
         # url: "$${__value.raw}" # 跳轉網址變數 (固定寫法)
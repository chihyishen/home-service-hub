<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 深色背景方塊，帶有平滑圓角 -->
  <rect width="100" height="100" rx="22" fill="#18181b"/>
  
  <!-- 抽象幾何結構：代表結構與穩定性 -->
  <!-- 左側支柱 (冷灰) -->
  <rect x="28" y="35" width="8" height="35" rx="1" fill="#71717a"/>
  
  <!-- 右側支柱 (純白) -->
  <rect x="64" y="30" width="8" height="40" rx="1" fill="#ffffff"/>
  
  <!-- 橫向連接線與斜角：暗示屋頂與連結 (純白) -->
  <path d="M28 52 H72" stroke="#ffffff" stroke-width="8" stroke-linecap="square"/>
  
  <!-- 頂部幾何點：代表 Hub 的節點 (純白) -->
  <circle cx="50" cy="30" r="5" fill="#ffffff"/>
</svg>

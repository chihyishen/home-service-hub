<p-toast></p-toast>
<div class="card p-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="m-0">交易紀錄</h3>
        <div class="flex gap-2">
            <p-button label="同步訂閱帳目" icon="pi pi-sync" severity="secondary" (onClick)="generateRecurring()" class="me-2"></p-button>
            <p-button label="新增交易" icon="pi pi-plus" (onClick)="showDialog()"></p-button>
        </div>
      </div>

    <!-- 篩選工具列 -->
    <div class="d-flex gap-3 mb-3 p-3 bg-light rounded align-items-center">
        <span class="fw-bold"><i class="pi pi-filter me-2"></i>篩選:</span>
        <div class="flex-grow-1" style="max-width: 250px;">
            <p-select [options]="categories()" optionLabel="name" optionValue="name" [(ngModel)]="selectedCategory" 
                        placeholder="所有分類" [showClear]="true" class="w-100" appendTo="body"></p-select>
        </div>
        <div class="flex-grow-1" style="max-width: 250px;">
            <p-select [options]="filterPaymentOptions()" optionLabel="label" optionValue="value" [(ngModel)]="selectedPaymentMethod" 
                        placeholder="所有支付方式" [showClear]="true" class="w-100" appendTo="body"></p-select>
        </div>
    </div>

    <p-table [value]="filteredTransactions()" [rows]="15" [paginator]="true" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="date" style="width: 100px">日期 <p-sortIcon field="date"></p-sortIcon></th>
        <th pSortableColumn="item">內容 <p-sortIcon field="item"></p-sortIcon></th>
        <th pSortableColumn="category" style="width: 160px">分類 <p-sortIcon field="category"></p-sortIcon></th>
        <th pSortableColumn="paymentMethod" style="width: 120px">方式 <p-sortIcon field="paymentMethod"></p-sortIcon></th>
        <th pSortableColumn="personalAmount" class="text-end" style="width: 130px">個人負擔 <p-sortIcon field="personalAmount"></p-sortIcon></th>
        <th pSortableColumn="actualSwipe" class="text-end" style="width: 130px">實際刷卡 <p-sortIcon field="actualSwipe"></p-sortIcon></th>
        <th pSortableColumn="status" style="width: 110px">狀態 <p-sortIcon field="status"></p-sortIcon></th>
        <th style="width: 120px">操作</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-txn>
      <tr>
        <td>{{ txn.date | date:'MM/dd' }}</td>
        <td>
            <div class="fw-bold text-truncate" style="max-width: 200px;" [title]="txn.item">{{ txn.item }}</div>
            <small class="text-muted text-truncate d-block" style="max-width: 200px;" *ngIf="txn.note" [title]="txn.note">{{ txn.note }}</small>
        </td>
        <td>
          <p-tag [value]="txn.category" [style]="{ 'background-color': getCategoryColor(txn.category) }"></p-tag>
        </td>
        <td class="text-truncate" [title]="txn.paymentMethod">{{ txn.paymentMethod }}</td>
        <td class="text-end" [class.text-danger]="txn.transactionType === 'EXPENSE'" [class.text-success]="txn.transactionType === 'INCOME'">
          <span class="d-flex align-items-center justify-content-end">
            <i [class]="txn.transactionType === 'EXPENSE' ? 'pi pi-minus-circle' : 'pi pi-plus-circle'" 
               class="me-1" style="font-size: 0.8rem;"></i>
            {{ txn.personalAmount | currency:'TWD':'symbol':'1.0-0' }}
          </span>
        </td>
        <td class="text-end fw-bold">{{ txn.actualSwipe | currency:'TWD':'symbol':'1.0-0' }}</td>
        <td>
            <p-tag [severity]="getStatusSeverity(txn.status)" [value]="getStatusLabel(txn.status)"></p-tag>
        </td>
        <td>
          <p-button icon="pi pi-ellipsis-v" [text]="true" [rounded]="true" severity="secondary" (click)="showMenu($event, txn)"></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>

  <p-dialog [header]="isEdit ? '編輯交易' : '新增交易'" [(visible)]="displayDialog" [modal]="true" [style]="{width: '45vw'}" [dismissableMask]="true">
    <div class="row g-3 mt-1">
      <div class="col-12">
        <label class="d-block mb-2">標題</label>
        <input pInputText [(ngModel)]="newTxn.item" class="w-100" placeholder="例如：午餐、Netflix 訂閱" />
      </div>
      <div class="col-6">
        <label class="d-block mb-2">日期</label>
        <p-datepicker [(ngModel)]="txnDate" dateFormat="yy-mm-dd" class="w-100" appendTo="body"></p-datepicker>
      </div>
      <div class="col-6">
        <label class="d-block mb-2">類型</label>
        <p-select [options]="typeOptions" [(ngModel)]="newTxn.transactionType" optionLabel="label" optionValue="value" class="w-100"></p-select>
      </div>
      <div class="col-6">
        <label class="d-block mb-2">分類</label>
        <p-select [options]="categories()" optionLabel="name" optionValue="id" [(ngModel)]="newTxn.categoryId" 
                    placeholder="選擇分類" (onChange)="onCategoryChange($event.value)" class="w-100" appendTo="body"></p-select>
      </div>
      <div class="col-6">
        <label class="d-block mb-2">支付工具</label>
        <p-select [options]="paymentOptions()" optionLabel="label" optionValue="value" [(ngModel)]="newTxn.paymentMethod" 
                    placeholder="選擇支付方式" class="w-100" (onChange)="onPaymentMethodChange($event.value)" appendTo="body"></p-select>
      </div>
      <div class="col-12" *ngIf="newTxn.paymentMethod !== '現金'">
        <label class="d-block mb-2">資金來源 / 信用卡</label>
        <p-select [options]="cards()" optionLabel="name" optionValue="id" [(ngModel)]="newTxn.cardId" 
                    placeholder="選擇信用卡 (可留空)" [showClear]="true" class="w-100" appendTo="body"></p-select>
      </div>
      <div class="col-4">
        <label class="d-block mb-2">個人負擔金額</label>
        <p-inputNumber [(ngModel)]="newTxn.personalAmount" mode="currency" currency="TWD" locale="zh-TW" [minFractionDigits]="0" [maxFractionDigits]="0" class="w-100"></p-inputNumber>
      </div>
      <div class="col-4">
        <label class="d-block mb-2">實際刷卡金額</label>
        <p-inputNumber [(ngModel)]="newTxn.actualSwipe" mode="currency" currency="TWD" locale="zh-TW" [minFractionDigits]="0" [maxFractionDigits]="0" class="w-100"></p-inputNumber>
      </div>
      <div class="col-4">
        <label class="d-block mb-2">備註 (可選)</label>
        <input pInputText [(ngModel)]="newTxn.note" class="w-100" />
      </div>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="取消" icon="pi pi-times" [text]="true" (onClick)="displayDialog = false"></p-button>
      <p-button label="儲存" icon="pi pi-check" (onClick)="saveTransaction()" [disabled]="!newTxn.item || !newTxn.category"></p-button>
    </ng-template>
  </p-dialog>
</div>

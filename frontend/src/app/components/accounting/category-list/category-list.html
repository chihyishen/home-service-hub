<p-toast></p-toast>
<div class="card p-4 category-page">
  <div class="hub-page-header justify-content-end">
    <div class="header-actions">
      <p-button label="套用現代色票" icon="pi pi-palette" severity="secondary" (onClick)="applyModernPalette()" styleClass="hub-btn-secondary"></p-button>
      <p-button label="新增分類" icon="pi pi-plus" (onClick)="showCategoryDialog()" styleClass="hub-btn-primary"></p-button>
    </div>
  </div>

  <div class="hub-modern-list">
    @for (category of categories(); track category.id) {
      <app-list-item [clickable]="true" (itemClick)="showCategoryMenu($event, category)">
        <ng-container left>
          <div class="d-flex align-items-center gap-3">
            <span [style.background-color]="category.color" class="color-indicator"></span>
            <div class="main-text m-0">{{ category.name }}</div>
          </div>
        </ng-container>
        <ng-container right>
          <div class="sub-text category-color-code">{{ category.color }}</div>
        </ng-container>
      </app-list-item>
    } @empty {
      <div class="empty-state">
        <i class="pi pi-tags"></i>
        <h4>無分類資料</h4>
        <p>尚未新增任何交易分類。</p>
      </div>
    }
  </div>

  <p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>

  <!-- 新增分類 Dialog -->
  <p-dialog [header]="isEditCategory ? '編輯分類' : '新增分類'" [(visible)]="displayCategoryDialog" [modal]="true" styleClass="hub-dialog-md" [dismissableMask]="true" appendTo="body">
    <div class="flex flex-column gap-3 mt-2 hub-form-grid">
      <div class="field">
        <label class="d-block mb-2">分類名稱</label>
        <input pInputText [(ngModel)]="newCategory.name" class="w-100" placeholder="例如：飲食、交通" />
      </div>
      <div class="field mt-3">
        <label class="d-block mb-2">標籤顏色 (HEX)</label>
        <input pInputText [(ngModel)]="newCategory.color" class="w-100" placeholder="#0ea5e9" />
      </div>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="取消" icon="pi pi-times" [text]="true" (onClick)="displayCategoryDialog = false"></p-button>
      <p-button label="儲存" icon="pi pi-check" (onClick)="saveCategory()" [disabled]="!newCategory.name" styleClass="hub-btn-primary"></p-button>
    </ng-template>
  </p-dialog>
</div>

<p-toast></p-toast>
<div class="card p-4">
  <div class="d-flex justify-content-between align-items-center mb-4 gap-2 flex-wrap">
    <h3 class="m-0">交易分類維護</h3>
    <div class="d-flex gap-2">
      <p-button label="套用現代色票" icon="pi pi-palette" severity="secondary" (onClick)="applyModernPalette()"></p-button>
      <p-button label="新增分類" icon="pi pi-plus" (onClick)="showCategoryDialog()"></p-button>
    </div>
  </div>

  <p-table [value]="categories()" [rows]="10" [paginator]="true" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="name">名稱 <p-sortIcon field="name"></p-sortIcon></th>
        <th pSortableColumn="color">顏色 <p-sortIcon field="color"></p-sortIcon></th>
        <th style="width: 100px">操作</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-category>
      <tr>
        <td>{{ category.name }}</td>
        <td>
          <div class="d-flex align-items-center">
            <span [style.background-color]="category.color" class="color-indicator"></span>
            {{ category.color }}
          </div>
        </td>
        <td>
          <p-button icon="pi pi-ellipsis-v" [text]="true" [rounded]="true" severity="secondary" (click)="showCategoryMenu($event, category)"></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>

  <!-- 新增分類 Dialog -->
  <p-dialog [header]="isEditCategory ? '編輯分類' : '新增分類'" [(visible)]="displayCategoryDialog" [modal]="true" [style]="{width: '30vw'}" [dismissableMask]="true">
    <div class="flex flex-column gap-3 mt-2">
      <div class="field">
        <label class="d-block mb-2">分類名稱</label>
        <input pInputText [(ngModel)]="newCategory.name" class="w-100" placeholder="例如：飲食、交通" />
      </div>
      <div class="field mt-3">
        <label class="d-block mb-2">標籤顏色 (HEX)</label>
        <input pInputText [(ngModel)]="newCategory.color" class="w-100" placeholder="#0ea5e9" />
      </div>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="取消" icon="pi pi-times" [text]="true" (onClick)="displayCategoryDialog = false"></p-button>
      <p-button label="儲存" icon="pi pi-check" (onClick)="saveCategory()" [disabled]="!newCategory.name"></p-button>
    </ng-template>
  </p-dialog>
</div>

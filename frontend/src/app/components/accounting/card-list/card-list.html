<p-toast></p-toast>
<div class="card p-3 p-lg-4">
  <div class="hub-page-header justify-content-end">
    <div class="header-actions">
      <p-button label="新增卡片" icon="pi pi-plus" (onClick)="showDialog()" styleClass="w-100-mobile hub-btn-primary"></p-button>
    </div>
  </div>

  <div class="hub-modern-list">
    @for (card of cards(); track card.id) {
      <app-list-item [clickable]="true" (itemClick)="showMenu($event, card)">
        <ng-container left>
          <div class="main-text">{{ card.name }}</div>
          <div class="sub-text">預設：{{ card.defaultPaymentMethod || '無' }}</div>
        </ng-container>
        <ng-container right>
          <div class="amount-text">{{ card.alertThreshold | currency:'TWD':'symbol':'1.0-0' }}</div>
          <div class="sub-text">結帳日：每月 {{ card.billingDay }} 日</div>
        </ng-container>
      </app-list-item>
    } @empty {
      <div class="empty-state">
        <i class="pi pi-credit-card"></i>
        <h4>無信用卡資料</h4>
        <p>尚未新增任何信用卡。</p>
      </div>
    }
  </div>

  <p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>

  <p-dialog [header]="isEdit ? '編輯信用卡' : '新增信用卡'" [(visible)]="displayDialog" [modal]="true" 
            styleClass="hub-dialog-md" [dismissableMask]="true" appendTo="body">
    <div class="flex flex-column gap-3 mt-2 hub-form-grid">
      <div class="field mb-1">
        <label for="name" class="d-block mb-1 fw-bold small">卡片名稱</label>
        <input pInputText id="name" [(ngModel)]="newCard.name" class="w-100" placeholder="例如：台新 FlyGo" />
      </div>
      <div class="row g-2">
        <div class="col-12 col-md-6">
          <div class="field">
            <label for="billingDay" class="d-block mb-1 fw-bold small">結帳日 (1-31)</label>
            <p-inputNumber id="billingDay" [(ngModel)]="newCard.billingDay" [min]="1" [max]="31" class="w-100" styleClass="w-100"></p-inputNumber>
          </div>
        </div>
        <div class="col-12 col-md-6">
          <div class="field">
            <label for="cycleType" class="d-block mb-1 fw-bold small">回饋週期</label>
            <p-select id="cycleType" [options]="cycleOptions" [(ngModel)]="newCard.rewardCycleType" optionLabel="label" optionValue="value" class="w-100" appendTo="body"></p-select>
          </div>
        </div>
      </div>
      <div class="field mb-1">
        <label for="threshold" class="d-block mb-1 fw-bold small">預警門檻</label>
        <p-inputNumber id="threshold" [(ngModel)]="newCard.alertThreshold" mode="currency" currency="TWD" locale="zh-TW" [minFractionDigits]="0" [maxFractionDigits]="0" class="w-100" styleClass="w-100"></p-inputNumber>
      </div>
      <div class="field mb-1">
        <label for="defaultTool" class="d-block mb-1 fw-bold small">預設支付工具 (如 Apple Pay)</label>
        <p-select id="defaultTool" [options]="toolOptions()" [(ngModel)]="newCard.defaultPaymentMethod" optionLabel="label" optionValue="value" class="w-100" appendTo="body"></p-select>
      </div>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="取消" icon="pi pi-times" [text]="true" (onClick)="displayDialog = false"></p-button>
      <p-button label="儲存" icon="pi pi-check" (onClick)="saveCard()" [disabled]="!newCard.name" styleClass="hub-btn-primary"></p-button>
    </ng-template>
  </p-dialog>
</div>

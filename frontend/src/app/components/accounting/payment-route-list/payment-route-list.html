<p-toast></p-toast>
<div class="card p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h3 class="m-0">支付自動路由</h3>
        <small class="text-muted">設定特定支付工具 (如 Line Pay) 預設對應的信用卡</small>
    </div>
    <p-button label="新增規則" icon="pi pi-plus" (onClick)="showDialog()"></p-button>
  </div>

  <p-table [value]="routes()" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>支付工具</th>
        <th><i class="pi pi-arrow-right mx-2"></i></th>
        <th>預設對應卡片</th>
        <th style="width: 100px">操作</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-route>
      <tr>
        <td class="fw-bold">{{ route.methodName }}</td>
        <td><i class="pi pi-arrow-right text-muted"></i></td>
        <td>
            <p-tag severity="info" [value]="getCardName(route.cardId)"></p-tag>
        </td>
        <td>
          <p-button icon="pi pi-trash" [text]="true" [rounded]="true" severity="danger" (click)="deleteRoute(route.id)"></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog header="新增路由規則" [(visible)]="displayDialog" [modal]="true" [style]="{width: '30vw'}" [dismissableMask]="true">
    <div class="flex flex-column gap-3 mt-2">
      <div class="field">
        <label class="d-block mb-2">選擇支付工具</label>
        <p-select [options]="paymentMethods()" optionLabel="name" optionValue="name" [(ngModel)]="newRoute.methodName" 
                    [editable]="true" placeholder="選擇或輸入名稱" class="w-100" appendTo="body"></p-select>
      </div>
      <div class="field mt-3">
        <label class="d-block mb-2">對應信用卡</label>
        <p-select [options]="cards()" optionLabel="name" optionValue="id" [(ngModel)]="newRoute.cardId" 
                    placeholder="選擇卡片" class="w-100" appendTo="body"></p-select>
      </div>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="取消" icon="pi pi-times" [text]="true" (onClick)="displayDialog = false"></p-button>
      <p-button label="儲存" icon="pi pi-check" (onClick)="saveRoute()" [disabled]="!newRoute.methodName || !newRoute.cardId"></p-button>
    </ng-template>
  </p-dialog>
</div>

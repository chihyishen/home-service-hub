<div class="container-fluid p-4">
    <div class="mobile-quick-switch mb-3">
        @for (section of sections; track section.value) {
            <button
                type="button"
                class="quick-tab-btn"
                [class.active]="activeTab() === section.value"
                (click)="activeTab.set(section.value)">
                <i class="pi" [class]="section.icon"></i>
                <span>{{ section.shortLabel }}</span>
            </button>
        }
    </div>

    <div class="desktop-tabbar mb-3">
        @for (section of sections; track section.value) {
            <button
                type="button"
                class="desktop-tab-btn"
                [class.active]="activeTab() === section.value"
                (click)="activeTab.set(section.value)">
                <i class="pi me-2" [class]="section.icon"></i>
                {{ section.label }}
            </button>
        }
    </div>

    <section class="management-content">
        @if (activeTab() === 'cards') {
            <app-card-list></app-card-list>
        }
        @if (activeTab() === 'payments') {
            <app-payment-method-list></app-payment-method-list>
        }
        @if (activeTab() === 'categories') {
            <app-category-list></app-category-list>
        }
        @if (activeTab() === 'recurring') {
            <app-recurring-list></app-recurring-list>
        }
    </section>
</div>

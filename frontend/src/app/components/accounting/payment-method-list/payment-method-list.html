<p-toast></p-toast>
<div class="card p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="m-0">支付方式維護</h3>
    <p-button label="新增支付方式" icon="pi pi-plus" (onClick)="showPMDialog()"></p-button>
  </div>

  <p-table [value]="paymentMethods()" [rows]="10" [paginator]="true" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="name">名稱 <p-sortIcon field="name"></p-sortIcon></th>
        <th pSortableColumn="isActive">狀態 <p-sortIcon field="isActive"></p-sortIcon></th>
        <th style="width: 100px">操作</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-pm>
      <tr>
        <td>{{ pm.name }}</td>
        <td>
          <p-tag [severity]="pm.isActive ? 'success' : 'secondary'" 
                 [value]="pm.isActive ? '啟用中' : '已停用'"></p-tag>
        </td>
        <td>
          <p-button icon="pi pi-ellipsis-v" [text]="true" [rounded]="true" severity="secondary" (click)="showPMMenu($event, pm)"></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>

  <!-- 新增支付方式 Dialog -->
  <p-dialog [header]="isEditPM ? '編輯支付方式' : '新增支付方式'" [(visible)]="displayPMDialog" [modal]="true" [style]="{width: '30vw'}" [dismissableMask]="true">
    <div class="flex flex-column gap-3 mt-2">
      <div class="field">
        <label class="d-block mb-2">名稱</label>
        <input pInputText [(ngModel)]="newPM.name" class="w-100" placeholder="例如：現金, Line Pay, 銀行轉帳" />
      </div>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="取消" icon="pi pi-times" [text]="true" (onClick)="displayPMDialog = false"></p-button>
      <p-button label="儲存" icon="pi pi-check" (onClick)="savePM()" [disabled]="!newPM.name"></p-button>
    </ng-template>
  </p-dialog>
</div>

<p-toast></p-toast>
<div class="card p-4 payment-method-page">
  <div class="hub-page-header justify-content-end">
    <div class="header-actions">
      <p-button label="新增支付方式" icon="pi pi-plus" (onClick)="showPMDialog()" styleClass="w-100-mobile hub-btn-primary"></p-button>
    </div>
  </div>

  <div class="hub-modern-list">
    @for (pm of paymentMethods(); track pm.id) {
      <app-list-item [clickable]="true" (itemClick)="showPMMenu($event, pm)">
        <ng-container left>
          <div class="main-text">{{ pm.name }}</div>
        </ng-container>
        <ng-container right>
          <p-tag [severity]="pm.isActive ? 'success' : 'secondary'" 
                 [value]="pm.isActive ? '啟用中' : '已停用'"></p-tag>
        </ng-container>
      </app-list-item>
    } @empty {
      <div class="empty-state">
        <i class="pi pi-wallet"></i>
        <h4>無支付方式</h4>
        <p>尚未新增任何支付方式。</p>
      </div>
    }
  </div>

  <p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>

  <!-- 新增支付方式 Dialog -->
  <p-dialog [header]="isEditPM ? '編輯支付方式' : '新增支付方式'" [(visible)]="displayPMDialog" [modal]="true" styleClass="hub-dialog-sm" [breakpoints]="{ '767px': '92vw' }" [dismissableMask]="true">
    <div class="flex flex-column gap-3 mt-2 hub-form-grid">
      <div class="field">
        <label class="d-block mb-2">名稱</label>
        <input pInputText [(ngModel)]="newPM.name" class="w-100" placeholder="例如：現金, Line Pay, 銀行轉帳" />
      </div>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="取消" icon="pi pi-times" [text]="true" (onClick)="displayPMDialog = false"></p-button>
      <p-button label="儲存" icon="pi pi-check" (onClick)="savePM()" [disabled]="!newPM.name" styleClass="hub-btn-primary"></p-button>
    </ng-template>
  </p-dialog>
</div>

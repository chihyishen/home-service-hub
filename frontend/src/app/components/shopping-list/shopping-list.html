<p-toast></p-toast>
<div class="hub-page-header justify-content-end">
  <div class="header-actions">
    <p-button label="低庫存自動產生" icon="pi pi-magic" severity="warn" (onClick)="generateFromLowStock()" styleClass="hub-btn-secondary"></p-button>
    <p-button label="手動新增" icon="pi pi-plus" (onClick)="openCreateDialog()" styleClass="hub-btn-primary"></p-button>
  </div>
</div>

<div class="hub-status-filter mb-4">
  <button class="filter-pill" [class.active]="statusFilter() === 'PENDING'" (click)="setStatus('PENDING')">
    待購買
  </button>
  <button class="filter-pill success" [class.active]="statusFilter() === 'PURCHASED'" (click)="setStatus('PURCHASED')">
    已購買
  </button>
  <button class="filter-pill secondary" [class.active]="statusFilter() === 'SKIPPED'" (click)="setStatus('SKIPPED')">
    略過
  </button>
</div>

<div class="hub-shopping-list">
  @for (row of items(); track row.id) {
    <div class="hub-shopping-item" [class.purchased]="row.status === 'PURCHASED'">
      <div class="item-main-row">
        <div class="item-check" (click)="updateStatus(row, row.status === 'PURCHASED' ? 'PENDING' : 'PURCHASED')">
          <i class="pi" [class]="row.status === 'PURCHASED' ? 'pi-check-circle' : 'pi-circle'"></i>
        </div>
        
        <div class="item-info">
          <div class="item-name">{{ row.itemNameSnapshot }}</div>
          <div class="item-meta">
            <span class="qty">數量: {{ row.suggestedQuantity }}</span>
            <span class="dot">•</span>
            <span class="source">{{ row.source === 'LOW_STOCK_RULE' ? '系統產生' : '手動新增' }}</span>
          </div>
          @if (row.note) {
            <div class="item-note">{{ row.note }}</div>
          }
        </div>

        <div class="item-actions">
          <p-button icon="pi pi-times" [text]="true" severity="secondary" 
                    *ngIf="row.status !== 'SKIPPED'" (onClick)="updateStatus(row, 'SKIPPED')" pTooltip="略過"></p-button>
          <p-button icon="pi pi-trash" [text]="true" severity="danger" (onClick)="remove(row.id)" pTooltip="刪除"></p-button>
        </div>
      </div>
    </div>
  } @empty {
    <div class="empty-state">
      <i class="pi pi-shopping-bag"></i>
      <h4>目前清爽無比</h4>
      <p>所有物品都已採買完成，或尚未有待購項目。</p>
      <p-button label="一鍵從低庫存產生" (onClick)="generateFromLowStock()" styleClass="hub-btn-secondary"></p-button>
    </div>
  }
</div>

<p-dialog header="新增採買項目" [(visible)]="displayDialog" [modal]="true" styleClass="hub-dialog-sm">
  <div class="hub-form-grid">
    <div class="field mb-3">
      <label class="d-block mb-2 fw-bold">品項名稱</label>
      <input pInputText class="w-100" [(ngModel)]="draft.itemNameSnapshot" placeholder="請輸入品項..." />
    </div>
    <div class="field mb-3">
      <label class="d-block mb-2 fw-bold">建議數量</label>
      <p-inputNumber [(ngModel)]="draft.suggestedQuantity" [min]="1" class="w-100"></p-inputNumber>
    </div>
    <div class="field mb-3">
      <label class="d-block mb-2 fw-bold">備註 (可選)</label>
      <input pInputText class="w-100" [(ngModel)]="draft.note" placeholder="例如：要買大包裝..." />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="取消" [text]="true" (onClick)="displayDialog = false"></p-button>
    <p-button label="加入清單" (onClick)="createManual()" [disabled]="!canCreateManual()" styleClass="hub-btn-primary"></p-button>
  </ng-template>
</p-dialog>

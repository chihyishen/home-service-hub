<div class="p-4 portfolio-form-page">
  <p-toast></p-toast>
  <p-confirmDialog [style]="{ width: '450px' }"></p-confirmDialog>

  <div class="page-header d-flex justify-content-between align-items-center mb-4">
    <h2 class="m-0">股利領取紀錄</h2>
    <p-button label="新增股利" icon="pi pi-plus" (onClick)="openNew()"></p-button>
  </div>

  <p-table [value]="dividends()" responsiveLayout="stack" [breakpoint]="'960px'">
    <ng-template pTemplate="header">
      <tr>
        <th>除息日期</th>
        <th>股票代碼</th>
        <th>股利總金額 (TWD)</th>
        <th>操作</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-d>
      <tr>
        <td>
          <span class="p-column-title fw-bold">除息日期</span>
          {{ d.ex_dividend_date | date:'yyyy-MM-dd' }}
        </td>
        <td>
          <span class="p-column-title fw-bold">股票代碼</span>
          <b>{{ d.symbol }}</b>
        </td>
        <td class="text-end">
          <span class="p-column-title fw-bold text-dark">股利總金額 (TWD)</span>
          {{ d.amount | number }}
        </td>
        <td class="action-cell">
          <span class="p-column-title fw-bold">操作</span>
          <p-button icon="pi pi-pencil" class="p-button-rounded p-button-text p-button-sm" (onClick)="editDividend(d)"></p-button>
          <p-button icon="pi pi-trash" class="p-button-rounded p-button-text p-button-danger p-button-sm" (onClick)="deleteDividend(d)"></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog
    [header]="isEdit() ? '修改股利' : '新增股利'"
    [(visible)]="showDialog"
    [modal]="true"
    [style]="{ width: '450px', maxWidth: '96vw' }"
    [breakpoints]="{ '991px': '70vw', '767px': '92vw' }"
    styleClass="portfolio-form-dialog"
    contentStyleClass="portfolio-form-content">
    <div class="grid p-fluid">
      <div class="col-12 mb-3">
        <label class="form-label">股票代碼</label>
        <input pInputText [(ngModel)]="newDividend.symbol" placeholder="例如: 2330" />
      </div>
      <div class="col-12 mb-3">
        <label class="form-label">股利金額 (TWD)</label>
        <p-inputNumber [(ngModel)]="newDividend.amount" [min]="0" mode="decimal"></p-inputNumber>
      </div>
      <div class="col-12 mb-3">
        <label class="form-label">除息日期</label>
        <p-datepicker [(ngModel)]="newDividend.ex_dividend_date" [showIcon]="true" appendTo="body"></p-datepicker>
      </div>
    </div>
    <ng-template pTemplate="footer">
      <div class="dialog-footer-actions">
        <p-button label="取消" icon="pi pi-times" (onClick)="showDialog.set(false)" class="p-button-text"></p-button>
        <p-button label="儲存" icon="pi pi-check" (onClick)="saveDividend()"></p-button>
      </div>
    </ng-template>
  </p-dialog>
</div>

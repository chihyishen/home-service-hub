<div class="p-4 portfolio-form-page">
  <p-toast></p-toast>
  <p-confirmDialog styleClass="hub-dialog-md"></p-confirmDialog>

  <div class="hub-page-header justify-content-end">
    <div class="header-actions">
      <p-button label="新增交易" icon="pi pi-plus" (onClick)="openNew()" styleClass="hub-btn-primary"></p-button>
    </div>
  </div>

  <div class="hub-modern-list">
    @for (t of transactions(); track t.id) {
      <app-list-item [clickable]="true" (itemClick)="showMenu($event, t)">
        <ng-container left>
          <div class="main-text">{{ t.symbol }}</div>
          <div class="sub-text">
            {{ t.trade_date | date:'yyyy-MM-dd' }} • 
            <span [class]="{'txn-type-buy': t.type === 'BUY', 'txn-type-sell': t.type === 'SELL'}">
              {{ t.type === 'BUY' ? '買進' : '賣出' }}
            </span>
          </div>
        </ng-container>
        <ng-container right>
          <div class="text-end">
            <div class="amount-text" [class]="{'txn-type-buy': t.type === 'BUY', 'txn-type-sell': t.type === 'SELL'}">
              {{ (t.price * t.quantity) | currency:'TWD':'symbol':'1.0-0' }}
            </div>
            <div class="sub-text">{{ t.quantity | number }} 股 @ {{ t.price | number:'1.1-2' }}</div>
          </div>
        </ng-container>
      </app-list-item>
    } @empty {
      <div class="empty-state">
        <i class="pi pi-list"></i>
        <h4>無交易紀錄</h4>
        <p>尚未記錄任何股票交易。</p>
      </div>
    }
  </div>

  <p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>

  <p-dialog
    [header]="isEdit() ? '修改交易' : '新增交易'"
    [(visible)]="showDialog"
    [modal]="true"
    styleClass="hub-dialog-md portfolio-form-dialog"
    [breakpoints]="{ '991px': '70vw', '767px': '92vw' }"
    contentStyleClass="portfolio-form-content">
    <div class="grid p-fluid">
      <div class="col-12 mb-3">
        <label class="form-label">交易類型</label>
        <p-selectButton [options]="transactionTypes" [(ngModel)]="newTransaction.type"></p-selectButton>
      </div>
      <div class="col-12 mb-3">
        <label class="form-label">交易日期 (選填)</label>
        <p-datepicker [(ngModel)]="newTransaction.trade_date" [showIcon]="true" appendTo="body"></p-datepicker>
      </div>
      <div class="col-12 mb-3">
        <label class="form-label">股票代碼</label>
        <input pInputText [(ngModel)]="newTransaction.symbol" placeholder="例如: 2330" />
      </div>
      <div class="col-12 mb-3">
        <label class="form-label">成交股數</label>
        <p-inputNumber [(ngModel)]="newTransaction.quantity" [min]="0"></p-inputNumber>
      </div>
      <div class="col-12 mb-3">
        <label class="form-label">成交單價</label>
        <p-inputNumber [(ngModel)]="newTransaction.price" mode="decimal" [minFractionDigits]="1"></p-inputNumber>
      </div>
      <div class="col-12 col-md-6 mb-3">
        <label class="form-label">手續費</label>
        <p-inputNumber [(ngModel)]="newTransaction.fee"></p-inputNumber>
      </div>
      <div class="col-12 col-md-6 mb-3">
        <label class="form-label">交易稅</label>
        <p-inputNumber [(ngModel)]="newTransaction.tax"></p-inputNumber>
      </div>
    </div>
    <ng-template pTemplate="footer">
      <div class="dialog-footer-actions">
        <p-button label="取消" icon="pi pi-times" (onClick)="showDialog.set(false)" class="p-button-text"></p-button>
        <p-button label="儲存" icon="pi pi-check" (onClick)="saveTransaction()"></p-button>
      </div>
    </ng-template>
  </p-dialog>
</div>

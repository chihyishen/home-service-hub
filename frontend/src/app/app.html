<div class="layout-wrapper" [class.sidebar-open]="isSidebarOpen()">
  <!-- Mobile Backdrop Overlay -->
  <div class="sidebar-backdrop" (click)="closeSidebar()"></div>

  <div class="sidebar shadow-sm" [class.show]="isSidebarOpen()">
    <div class="sidebar-header p-3 border-bottom mb-3 d-flex justify-content-between align-items-center">
      <h5 class="m-0"><i class="pi pi-home me-2"></i>Home Hub</h5>
      <button class="btn btn-link d-lg-none text-dark p-0" (click)="closeSidebar()">
        <i class="pi pi-times"></i>
      </button>
    </div>
    
    <div class="menu-section px-2">
      <small class="text-muted px-3 text-uppercase fw-bold" style="font-size: 0.7rem;">通用</small>
      <ul class="nav flex-column mt-2">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <i class="pi pi-box me-2"></i>庫存管理
          </a>
        </li>
      </ul>

      <small class="text-muted px-3 text-uppercase fw-bold mt-4 d-block" style="font-size: 0.7rem;">財務記帳</small>
      <ul class="nav flex-column mt-2">
        <li class="nav-item">
          <a class="nav-link" routerLink="/accounting/dashboard" routerLinkActive="active">
            <i class="pi pi-chart-pie me-2"></i>分析儀表板
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/accounting/transactions" routerLinkActive="active">
            <i class="pi pi-list me-2"></i>交易紀錄
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/accounting/settings" routerLinkActive="active">
            <i class="pi pi-cog me-2"></i>會計管理中心
          </a>
        </li>
      </ul>
    </div>
  </div>

  <div class="main-content">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4 px-3 px-lg-4 sticky-top">
      <div class="container-fluid d-flex align-items-center">
        <!-- Mobile Toggle Button -->
        <button class="btn btn-link d-lg-none me-2 text-dark p-0" (click)="toggleSidebar()">
          <i class="pi pi-bars" style="font-size: 1.25rem;"></i>
        </button>

        <span class="navbar-text fw-bold text-dark flex-grow-1 overflow-hidden text-nowrap text-truncate">
          {{ title() }}
        </span>
      </div>
    </nav>

    <main class="container-fluid px-3 px-lg-4 pb-4">
      <router-outlet />
    </main>
  </div>
</div>

<div class="layout-wrapper">
  <div class="sidebar shadow-sm">
    <div class="sidebar-header p-3 border-bottom mb-3">
      <h5 class="m-0"><i class="pi pi-home me-2"></i>Home Hub</h5>
    </div>
    
    <div class="menu-section px-2">
      <small class="text-muted px-3 text-uppercase fw-bold" style="font-size: 0.7rem;">通用</small>
      <ul class="nav flex-column mt-2">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <i class="pi pi-box me-2"></i>庫存管理
          </a>
        </li>
      </ul>

      <small class="text-muted px-3 text-uppercase fw-bold mt-4 d-block" style="font-size: 0.7rem;">財務記帳</small>
      <ul class="nav flex-column mt-2">
        <li class="nav-item">
          <a class="nav-link" routerLink="/accounting/dashboard" routerLinkActive="active">
            <i class="pi pi-chart-pie me-2"></i>分析儀表板
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/accounting/transactions" routerLinkActive="active">
            <i class="pi pi-list me-2"></i>交易紀錄
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/accounting/settings" routerLinkActive="active">
            <i class="pi pi-cog me-2"></i>會計管理中心
          </a>
        </li>
      </ul>
    </div>
  </div>

  <div class="main-content">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4 px-4 sticky-top">
      <div class="container-fluid">
        <span class="navbar-text fw-bold text-dark">
          {{ title() }}
        </span>
      </div>
    </nav>

    <main class="container-fluid px-4 pb-4">
      <router-outlet />
    </main>
  </div>
</div>

<div class="hub-layout-wrapper">
  <!-- 桌面端：懸浮側邊欄 (維持現狀) -->
  <aside class="hub-dock d-none d-lg-flex">
    <div class="dock-header mb-4">
      <div class="app-logo">
        <i class="pi pi-home"></i>
      </div>
    </div>
    
    <nav class="dock-nav">
      <a class="dock-item" [class.active]="activeTab() === 'inventory'" (click)="setTab('inventory')" pTooltip="庫存管理" tooltipPosition="right">
        <i class="pi pi-box"></i>
      </a>
      <a class="dock-item" [class.active]="activeTab() === 'shopping'" (click)="setTab('shopping')" pTooltip="採買清單" tooltipPosition="right">
        <i class="pi pi-shopping-cart"></i>
      </a>
      <div class="dock-divider"></div>
      <a class="dock-item" [class.active]="activeTab() === 'portfolio'" (click)="setTab('portfolio')" pTooltip="投資概覽" tooltipPosition="right">
        <i class="pi pi-chart-line"></i>
      </a>
      <a class="dock-item sub-item" [class.active]="activeTab() === 'portfolio-transactions'" (click)="setTab('portfolio-transactions')" pTooltip="股票交易紀錄" tooltipPosition="right">
        <i class="pi pi-list"></i>
      </a>
      <a class="dock-item sub-item" [class.active]="activeTab() === 'portfolio-dividends'" (click)="setTab('portfolio-dividends')" pTooltip="股利領取紀錄" tooltipPosition="right">
        <i class="pi pi-percentage"></i>
      </a>
      <div class="dock-divider"></div>
      <a class="dock-item" [class.active]="activeTab() === 'acc-transactions'" (click)="setTab('acc-transactions')" pTooltip="交易紀錄" tooltipPosition="right">
        <i class="pi pi-wallet"></i>
      </a>
      <a class="dock-item sub-item" [class.active]="activeTab() === 'acc-dashboard'" (click)="setTab('acc-dashboard')" pTooltip="記帳分析" tooltipPosition="right">
        <i class="pi pi-chart-pie"></i>
      </a>
      <a class="dock-item sub-item" [class.active]="activeTab() === 'settings'" (click)="setTab('settings')" pTooltip="會計設定" tooltipPosition="right">
        <i class="pi pi-cog"></i>
      </a>
    </nav>
  </aside>

  <!-- 主要內容區塊 -->
  <div class="hub-main-content">
    <header class="hub-top-header">
      <div class="header-container px-3 px-lg-4">
        <h1 class="header-title m-0 text-truncate">{{ title() }}</h1>
      </div>
    </header>

    <main class="hub-page-container px-3 px-lg-4 pb-5 pb-lg-4">
      <!-- 元件容器 (同前) -->
      <div class="tab-container" [hidden]="activeTab() !== 'inventory'"><app-item-list></app-item-list></div>
      <div class="tab-container" [hidden]="activeTab() !== 'shopping'"><app-shopping-list></app-shopping-list></div>
      <div class="tab-container" [hidden]="activeTab() !== 'portfolio'"><app-portfolio-dashboard></app-portfolio-dashboard></div>
      <div class="tab-container" [hidden]="activeTab() !== 'portfolio-transactions'"><app-portfolio-transactions></app-portfolio-transactions></div>
      <div class="tab-container" [hidden]="activeTab() !== 'portfolio-dividends'"><app-portfolio-dividends></app-portfolio-dividends></div>
      <div class="tab-container" [hidden]="activeTab() !== 'acc-dashboard'"><app-accounting-dashboard></app-accounting-dashboard></div>
      <div class="tab-container" [hidden]="activeTab() !== 'acc-transactions'"><app-transaction-list></app-transaction-list></div>
      <div class="tab-container" [hidden]="activeTab() !== 'settings'"><app-management-center></app-management-center></div>
    </main>
  </div>

  <!-- 手機端：整合式底部控制中心 -->
  <div class="hub-mobile-nav-shell d-lg-none glass-effect">
    <!-- 二級導覽 (搬到下面) -->
    <div class="hub-sub-nav">
      <div class="segmented-control">
        @if (mainTab() === 'supplies') {
          <button [class.active]="activeTab() === 'inventory'" (click)="setTab('inventory')">庫存</button>
          <button [class.active]="activeTab() === 'shopping'" (click)="setTab('shopping')">採買</button>
        }
        @if (mainTab() === 'portfolio') {
          <button [class.active]="activeTab() === 'portfolio'" (click)="setTab('portfolio')">概覽</button>
          <button [class.active]="activeTab() === 'portfolio-transactions'" (click)="setTab('portfolio-transactions')">交易</button>
          <button [class.active]="activeTab() === 'portfolio-dividends'" (click)="setTab('portfolio-dividends')">股利</button>
        }
        @if (mainTab() === 'accounting') {
          <button [class.active]="activeTab() === 'acc-transactions'" (click)="setTab('acc-transactions')">紀錄</button>
          <button [class.active]="activeTab() === 'acc-dashboard'" (click)="setTab('acc-dashboard')">分析</button>
          <button [class.active]="activeTab() === 'settings'" (click)="setTab('settings')">管理</button>
        }
      </div>
    </div>

    <!-- 底部主標籤列 -->
    <nav class="hub-bottom-tab-bar">
      <a class="tab-item" [class.active]="mainTab() === 'supplies'" (click)="setTab('inventory')">
        <i class="pi pi-box"></i><span>物資</span>
      </a>
      <a class="tab-item" [class.active]="mainTab() === 'portfolio'" (click)="setTab('portfolio')">
        <i class="pi pi-chart-line"></i><span>投資</span>
      </a>
      <a class="tab-item" [class.active]="mainTab() === 'accounting'" (click)="setTab('acc-transactions')">
        <i class="pi pi-wallet"></i><span>財務</span>
      </a>
    </nav>
  </div>
</div>

# Shared lint config for all Python services; ruff discovers this from the repo root.
line-length = 120
target-version = "py313"

[lint]
select = [
    "E4", # imports
    "E7", # statement style
    "E9", # syntax errors
    "F",  # pyflakes
    "I",  # import sorting
    "UP", # pyupgrade
    "B",  # bugbear
    "RUF",
]
ignore = [
    # Comments/docstrings/messages are written in Traditional Chinese; full-width
    # punctuation trips the ambiguous-unicode rules constantly.
    "RUF001",
    "RUF002",
    "RUF003",
    # `class X(str, Enum)` → StrEnum changes str(member) output; the enums are
    # serialized into the DB and API responses, so leave the migration for a
    # deliberate change with its own tests.
    "UP042",
]

[lint.flake8-bugbear]
# FastAPI dependency-injection callables are intentionally evaluated per-request.
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Body",
    "fastapi.Header",
    "fastapi.File",
    "fastapi.Form",
]

[lint.per-file-ignores]
# Alembic migrations are generated scaffolding; keep lint noise out of them.
"**/alembic/versions/*" = ["I", "UP"]
# Package __init__ imports are intentional re-exports; accounting's schemas
# package also defines base classes before importing submodules that need them.
"**/__init__.py" = ["F401", "E402"]
# Tests set environment variables before importing the app under test.
"**/tests/**" = ["E402"]

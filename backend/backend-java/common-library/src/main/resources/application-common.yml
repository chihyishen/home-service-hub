springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logbook:
  filter:
    enabled: true
  write:
    level: TRACE
    chunk-size: 1000
# 自定義 Appender 設定
loki:
  url: ${LOKI_URL:http://localhost:3100/loki/api/v1/push}

logging:
  level:
    # Common LoggingConfig 設定
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
  pattern:
    # 搭配 Micrometer Tracing 的標準關聯 ID 格式
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

management:
  # 1. Endpoints 暴露設定
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics

  # 2. 觀測功能總開關 (Observation Registry)
  observations:
    annotations:
      enabled: true

  # 3. Tracing 邏輯設定 (採樣率、傳播方式)
  tracing:
    sampling:
      probability: 1.0 # 全域採樣率 100%

  # 4. Metrics 邏輯設定 (Tags、分佈統計)
  metrics:
    tags:
      # 將應用程式名稱注入所有指標 (Prometheus/OTLP 必備)
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

  # 5. OTLP Exporter 統一設定區 (Metrics & Tracing)
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://localhost:4318/v1/metrics}
        step: 10s

  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
          compression: gzip
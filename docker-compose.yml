services:
  # --- 1. 資料庫 ---
  postgres:
    image: postgres:15-alpine
    container_name: inventory-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${INVENTORY_DB} # 這裡預設起庫存 DB
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- 2. 訊息佇列 ---
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: inventory-rabbitmq
    hostname: rabbitmq
    environment:
      - RABBITMQ_NODENAME=rabbit@rabbitmq
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_UI_PORT}:15672"
    volumes:
      - ./infra/config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - inventory-net

  # --- 3. 微服務 ---
  inventory-item-service:
    profiles: ["apps"]
    build:
      context: ./services/inventory-api
    container_name: inventory-item-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${INVENTORY_DB}
    ports:
      - "${INVENTORY_ITEM_SERVICE_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  accounting-service:
    profiles: ["apps"]
    build:
      context: ./services/accounting-service
    container_name: accounting-service
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${ACCOUNTING_DB}
    ports:
      - "${ACCOUNTING_SERVICE_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  stock-portfolio-service:
    profiles: ["apps"]
    build:
      context: ./services/stock-portfolio-service
    container_name: stock-portfolio-service
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${STOCK_DB}
    ports:
      - "${STOCK_SERVICE_PORT}:8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --- 4. OpenTelemetry Collector ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: inventory-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/config/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - tempo
      - prometheus
      - loki
    networks:
      - inventory-net

  # --- 5. 監控 (Tempo, Prometheus, Loki, Grafana) ---
  tempo:
    image: grafana/tempo:latest
    container_name: inventory-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    ports:
      - "3200:3200"
    volumes:
      - ./infra/config/tempo.yaml:/etc/tempo.yaml
      - ./infra/tempo-data:/var/tempo
    networks:
      - inventory-net

  prometheus:
    image: prom/prometheus:latest
    container_name: inventory-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/config/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - inventory-net

  loki:
    image: grafana/loki:latest
    container_name: inventory-loki
    ports:
      - "3100:3100"
      - "9096:9096"
    volumes:
      - ./infra/config/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - inventory-net

  grafana:
    image: grafana/grafana:latest
    container_name: inventory-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus
      - loki
      - tempo
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/config/grafana-config.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    networks:
      - inventory-net

  # --- 6. 物件儲存 (MinIO) ---
  minio:
    image: minio/minio
    container_name: inventory-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - ./infra/minio-data:/data
    networks:
      - inventory-net

networks:
  inventory-net:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
    external: true
    name: home-service-hub_rabbitmq_data_clean
  grafana_data:

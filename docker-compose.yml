x-internal-no-proxy-env: &internal-no-proxy-env
  NO_PROXY: "localhost,127.0.0.1,127.0.0.0/8,::1,0.250.250.0/24,*.orb.internal,*.orb.local,vm.orb.internal,services.orb.internal,services2.orb.internal,proxyproxy.orb.internal,gateway.orb.internal,gateway.docker.internal,host.internal,host.orb.internal,host.docker.internal,host.lima.internal,docker.orb.internal,docker.orb.local,k8s.orb.local,docker.for.mac.localhost,docker.for.mac.host.internal,postgres,rabbitmq,tempo,loki,prometheus,grafana,minio,otel-collector,inventory-postgres,inventory-rabbitmq,inventory-tempo,inventory-loki,inventory-prometheus,inventory-grafana,inventory-minio,inventory-otel-collector"
  no_proxy: "localhost,127.0.0.1,127.0.0.0/8,::1,0.250.250.0/24,*.orb.internal,*.orb.local,vm.orb.internal,services.orb.internal,services2.orb.internal,proxyproxy.orb.internal,gateway.orb.internal,gateway.docker.internal,host.internal,host.orb.internal,host.docker.internal,host.lima.internal,docker.orb.internal,docker.orb.local,k8s.orb.local,docker.for.mac.localhost,docker.for.mac.host.internal,postgres,rabbitmq,tempo,loki,prometheus,grafana,minio,otel-collector,inventory-postgres,inventory-rabbitmq,inventory-tempo,inventory-loki,inventory-prometheus,inventory-grafana,inventory-minio,inventory-otel-collector"

services:
  keycloak-postgres:
    image: postgres:17.5-alpine
    profiles: ["apps", "identity"]
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.1
    profiles: ["apps", "identity"]
    command: ["start-dev", "--import-realm", "--health-enabled=true"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_SMOKE_AGENT_SECRET: ${KEYCLOAK_SMOKE_AGENT_SECRET}
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL}
      KC_HOSTNAME_STRICT: "true"
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/keycloak.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/keycloak-key.pem
      # With TLS configured the management interface (9000) turns HTTPS, which the
      # plain /dev/tcp healthcheck cannot speak. Serve health on the main HTTP
      # listener (8080) instead; deprecated flag but fine until KC offers http-management-scheme.
      KC_LEGACY_OBSERVABILITY_INTERFACE: "true"
    ports:
      - "${IDENTITY_BIND_HOST:-127.0.0.1}:${KEYCLOAK_PORT:-8180}:8080"
      - "${IDENTITY_BIND_HOST:-127.0.0.1}:${KEYCLOAK_HTTPS_PORT:-8443}:8443"
    volumes:
      - ./infra/keycloak/realm-home-service-hub.json:/opt/keycloak/data/import/realm-home-service-hub.json:ro
      - ./infra/keycloak/certs:/opt/keycloak/certs:ro
      - ./infra/keycloak/themes:/opt/keycloak/themes:ro
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  gateway-service:
    profiles: ["apps"]
    build:
      context: ./services/gateway-service
    environment:
      GATEWAY_BIND_HOST: 0.0.0.0
      GATEWAY_PORT: 8088
      GATEWAY_INVENTORY_URI: http://inventory-item-service:8080
      GATEWAY_ACCOUNTING_URI: http://accounting-service:8000
      GATEWAY_PORTFOLIO_URI: http://stock-portfolio-service:8001
      GATEWAY_MINIO_URI: http://minio:9000
      GATEWAY_OTLP_URI: http://otel-collector:4318
      OIDC_ISSUER_URI: ${OIDC_ISSUER_URI}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-home-service-api}
      GATEWAY_JWKS_URI: http://keycloak:8080/realms/home-service-hub/protocol/openid-connect/certs
    ports:
      - "${GATEWAY_BIND_HOST:-127.0.0.1}:${GATEWAY_PORT:-8088}:8088"
    depends_on:
      inventory-item-service:
        condition: service_healthy
      accounting-service:
        condition: service_healthy
      stock-portfolio-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - inventory-net
    extra_hosts:
      - "${KEYCLOAK_PUBLIC_HOST:-host.docker.internal}:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8088/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  # --- 1. 資料庫 ---
  postgres:
    image: postgres@sha256:b3968e348b48f1198cc6de6611d055dbad91cd561b7990c406c3fc28d7095b21
    container_name: inventory-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${INVENTORY_DB} # 這裡預設起庫存 DB
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- 2. 訊息佇列 ---
  rabbitmq:
    profiles: ["messaging"]
    image: rabbitmq@sha256:606d8c0d6b3c18d1da9afc53bc7cdb2a8d5486df91b5a9830e9e07626c9ae281
    container_name: inventory-rabbitmq
    hostname: rabbitmq
    environment:
      - RABBITMQ_NODENAME=rabbit@rabbitmq
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:${RABBITMQ_PORT}:5672"
      - "${INFRA_BIND_HOST:-127.0.0.1}:${RABBITMQ_UI_PORT}:15672"
    volumes:
      - ./infra/config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - inventory-net

  # --- 3. 微服務 ---
  inventory-item-service:
    profiles: ["apps"]
    build:
      context: ./services/inventory-api
    container_name: inventory-item-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${INVENTORY_DB}
      - INVENTORY_SERVER_ADDRESS=0.0.0.0
      - SECURITY_OAUTH2_ENFORCEMENT_ENABLED=true
      - SECURITY_OAUTH2_ISSUER_URI=${OIDC_ISSUER_URI}
      - SECURITY_OAUTH2_AUDIENCE=${OIDC_AUDIENCE:-home-service-api}
      - SECURITY_OAUTH2_JWK_SET_URI=http://keycloak:8080/realms/home-service-hub/protocol/openid-connect/certs
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${INVENTORY_ITEM_SERVICE_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  accounting-service:
    profiles: ["apps"]
    build:
      context: ./services/accounting-service
    container_name: accounting-service
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${ACCOUNTING_DB}
      - AUTH_ENFORCEMENT_ENABLED=true
      - OIDC_ISSUER_URI=${OIDC_ISSUER_URI}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE:-home-service-api}
      - OIDC_JWKS_URI=http://keycloak:8080/realms/home-service-hub/protocol/openid-connect/certs
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${ACCOUNTING_SERVICE_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  stock-portfolio-service:
    profiles: ["apps"]
    build:
      context: ./services/stock-portfolio-service
    container_name: stock-portfolio-service
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${STOCK_DB}
      - AUTH_ENFORCEMENT_ENABLED=true
      - OIDC_ISSUER_URI=${OIDC_ISSUER_URI}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE:-home-service-api}
      - OIDC_JWKS_URI=http://keycloak:8080/realms/home-service-hub/protocol/openid-connect/certs
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${STOCK_SERVICE_PORT}:8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --- 4. OpenTelemetry Collector ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib@sha256:213886eb6407af91b87fa47551c3632be1a6419ff3a5114ef1e6fc364628496f
    container_name: inventory-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    environment:
      <<: *internal-no-proxy-env
    volumes:
      - ./infra/config/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:4317:4317"
      - "${INFRA_BIND_HOST:-127.0.0.1}:4318:4318"
      - "${INFRA_BIND_HOST:-127.0.0.1}:8889:8889"
    depends_on:
      - tempo
      - prometheus
      - loki
    networks:
      - inventory-net

  # --- 5. 監控 (Tempo, Prometheus, Loki, Grafana) ---
  tempo:
    image: grafana/tempo@sha256:feb779230ff7ba69900b17e157360c3e056e8a58123f9fb5ea29ac40ebf5531b
    container_name: inventory-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:3200:3200"
    volumes:
      - ./infra/config/tempo.yaml:/etc/tempo.yaml
      - ./infra/tempo-data:/var/tempo
    networks:
      - inventory-net

  prometheus:
    image: prom/prometheus@sha256:1f0f50f06acaceb0f5670d2c8a658a599affe7b0d8e78b898c1035653849a702
    container_name: inventory-prometheus
    environment:
      <<: *internal-no-proxy-env
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:9090:9090"
    volumes:
      - ./infra/config/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - inventory-net

  loki:
    image: grafana/loki@sha256:be31579ac047e9f78b81e48f3b69d3af709e7299b431d5aa78bcda43382f9511
    container_name: inventory-loki
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:3100:3100"
      - "${INFRA_BIND_HOST:-127.0.0.1}:9096:9096"
    volumes:
      - ./infra/config/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - inventory-net

  grafana:
    image: grafana/grafana@sha256:2175aaa91c96733d86d31cf270d5310b278654b03f5718c59de12a865380a31f
    container_name: inventory-grafana
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:3000:3000"
    environment:
      <<: *internal-no-proxy-env
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus
      - loki
      - tempo
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/config/grafana-config.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    networks:
      - inventory-net

  # --- 6. 物件儲存 (MinIO) ---
  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: inventory-minio
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:9000:9000"
      - "${INFRA_BIND_HOST:-127.0.0.1}:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - ./infra/minio-data:/data
    networks:
      - inventory-net

networks:
  inventory-net:
    driver: bridge

volumes:
  postgres_data:
  keycloak_postgres_data:
  rabbitmq_data:
    external: true
    name: home-service-hub_rabbitmq_data_clean
  grafana_data:

server:
  address: ${GATEWAY_BIND_HOST:127.0.0.1}
  port: ${GATEWAY_PORT:8088}
  max-http-request-header-size: 16KB
  tomcat:
    max-swallow-size: 2MB
    connection-timeout: 5s
  forward-headers-strategy: none

security:
  oidc:
    issuer-uri: ${OIDC_ISSUER_URI}
    audience: ${OIDC_AUDIENCE:home-service-api}
    jwk-set-uri: ${GATEWAY_JWKS_URI:}
gateway:
  instance-count: ${GATEWAY_INSTANCE_COUNT:1}
  rate-limit:
    store: ${GATEWAY_RATE_STORE:local}
    capacity: ${GATEWAY_RATE_BUSINESS_CAPACITY:120}
    refill-per-minute: ${GATEWAY_RATE_BUSINESS_REFILL_PER_MINUTE:60}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: inventory-items
              uri: ${GATEWAY_INVENTORY_URI:http://127.0.0.1:8080}
              predicates: [Path=/api/items/**]
            - id: shopping-list
              uri: ${GATEWAY_INVENTORY_URI:http://127.0.0.1:8080}
              predicates: [Path=/api/shopping-list/**]
            - id: accounting
              uri: ${GATEWAY_ACCOUNTING_URI:http://127.0.0.1:8000}
              predicates: [Path=/api/accounting/**]
              filters: [StripPrefix=2]
            - id: portfolio
              uri: ${GATEWAY_PORTFOLIO_URI:http://127.0.0.1:8001}
              predicates: [Path=/api/portfolio/**]
            - id: inventory-images
              uri: ${GATEWAY_MINIO_URI:http://127.0.0.1:9000}
              predicates: [Path=/minio/inventory-items/**, "Method=GET,HEAD"]
              filters: [StripPrefix=1]
            - id: browser-otlp
              uri: ${GATEWAY_OTLP_URI:http://127.0.0.1:4318}
              predicates: [Path=/otlp/v1/traces, Method=POST, "Header=Content-Type,application/(x-protobuf|json).*"]
              filters: [StripPrefix=1, RequestSize=1MB]
          http-client:
            connect-timeout: 3000
            read-timeout: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    org.springframework.security: INFO
    org.springframework.cloud.gateway: INFO

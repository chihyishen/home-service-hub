server:
  port: ${BACKEND_PORT}

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: inventory-item-service

  config:
    import: "optional:classpath:application-common-lib.yml"

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# 這裡可以只留開發階段特有的 Log 設定 (例如想看 SQL)
logging:
  level:
    org.hibernate.SQL: DEBUG
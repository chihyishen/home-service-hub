server:
  port: ${INVENTORY_ITEM_SERVICE_PORT}

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: ${SPRING_APPLICATION_NAME}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 15MB    # phone photos are ~3-8MB; default 1MB rejected them
      max-request-size: 15MB

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${POSTGRES_PORT}/${INVENTORY_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logbook:
  filter:
    enabled: true
  strategy: default
  format:
    style: json

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-}]"

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
  bucket-name: ${MINIO_BUCKET_NAME:inventory-items}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    db:
      enabled: true

  observations:
    annotations:
      enabled: true
    sql:
      query-text:
        enabled: true
    key-values:
      db.system: "postgresql"
      db.query.text.enabled: true

  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_COLLECTOR_ENDPOINT_HTTP}/v1/traces
          compression: gzip
    logging:
      export:
        otlp:
          endpoint: ${OTEL_COLLECTOR_ENDPOINT_HTTP}/v1/logs

  tracing:
    sampling:
      probability: 0.3

  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

  otlp:
    metrics:
      export:
        url: ${OTEL_COLLECTOR_ENDPOINT_HTTP}/v1/metrics
        step: 10s

jdbc:
  datasource-proxy:
    enabled: true
    include-parameter-values: true
  observation:
    enabled: true
    include-query-arguments: true
